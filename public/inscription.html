<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inscription — RentCloudy</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    .auth-wrapper {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #eff6ff 0%, #f0fdf4 100%);
      padding: 2rem 1rem;
    }
    .auth-card {
      background: white; border-radius: 20px; padding: 2.5rem;
      width: 100%; max-width: 460px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.08);
    }
    .auth-logo {
      text-align: center; margin-bottom: 2rem;
    }
    .auth-logo i { font-size: 2.5rem; color: #3b82f6; }
    .auth-logo h1 { font-size: 1.5rem; margin: 0.5rem 0 0.25rem; }
    .auth-logo p { color: #64748b; font-size: 0.9rem; }
    .auth-divider { text-align:center; margin:1.5rem 0; color:#94a3b8; font-size:0.85rem; position:relative; }
    .auth-divider::before, .auth-divider::after {
      content:''; position:absolute; top:50%; width:42%; height:1px; background:#e2e8f0;
    }
    .auth-divider::before { left:0; }
    .auth-divider::after { right:0; }
    .auth-footer { text-align:center; margin-top:1.5rem; color:#64748b; font-size:0.9rem; }
    .auth-footer a { color:#3b82f6; font-weight:600; text-decoration:none; }
    .input-icon { position:relative; }
    .input-icon i { position:absolute; left:12px; top:50%; transform:translateY(-50%); color:#94a3b8; }
    .input-icon input { padding-left:2.5rem !important; }
    #erreur-global { background:#fef2f2; border:1px solid #fca5a5; color:#dc2626; border-radius:8px; padding:0.75rem 1rem; margin-bottom:1rem; display:none; font-size:0.9rem; }
    .force-pwd { display:flex; gap:4px; margin-top:6px; }
    .force-bar { flex:1; height:4px; border-radius:2px; background:#e2e8f0; transition:background 0.3s; }
    .force-label { font-size:0.75rem; color:#94a3b8; margin-top:4px; }
  </style>
</head>
<body>

  <div class="auth-wrapper">
    <div class="auth-card">

      <div class="auth-logo">
        <a href="index.html" style="text-decoration:none;color:inherit;">
          <i class="fas fa-cloud"></i>
          <h1>Rent<strong>Cloudy</strong></h1>
        </a>
        <p>Créez votre compte gratuitement</p>
      </div>

      <div id="erreur-global"></div>

      <div class="form-group">
        <label>Nom complet *</label>
        <div class="input-icon">
          <i class="fas fa-user"></i>
          <input type="text" id="nom" placeholder="Jean Dupont"/>
        </div>
      </div>

      <div class="form-group">
        <label>Email *</label>
        <div class="input-icon">
          <i class="fas fa-envelope"></i>
          <input type="email" id="email" placeholder="jean@example.com"/>
        </div>
      </div>

      <div class="form-group">
        <label>Téléphone (optionnel)</label>
        <div class="input-icon">
          <i class="fas fa-phone"></i>
          <input type="tel" id="telephone" placeholder="+237 6XX XXX XXX"/>
        </div>
      </div>

      <div class="form-group">
        <label>Mot de passe * <span style="color:#94a3b8;font-size:0.8rem;">(min. 6 caractères)</span></label>
        <div class="input-icon">
          <i class="fas fa-lock"></i>
          <input type="password" id="password" placeholder="••••••••" oninput="evaluerForce(this.value)"/>
        </div>
        <div class="force-pwd">
          <div class="force-bar" id="bar1"></div>
          <div class="force-bar" id="bar2"></div>
          <div class="force-bar" id="bar3"></div>
          <div class="force-bar" id="bar4"></div>
        </div>
        <div class="force-label" id="force-label"></div>
      </div>

      <div class="form-group">
        <label>Confirmer le mot de passe *</label>
        <div class="input-icon">
          <i class="fas fa-lock"></i>
          <input type="password" id="confirm-password" placeholder="••••••••"/>
        </div>
      </div>

      <button class="btn btn-primary" style="width:100%;justify-content:center;padding:0.9rem;"
              id="btn-inscription" onclick="sInscrire()">
        <i class="fas fa-user-plus"></i> Créer mon compte
      </button>

      <div class="auth-footer">
        Déjà un compte ? <a href="connexion.html">Se connecter</a>
      </div>

    </div>
  </div>

  <script>
    function evaluerForce(pwd) {
      const bars = [document.getElementById('bar1'), document.getElementById('bar2'),
                    document.getElementById('bar3'), document.getElementById('bar4')]
      const label = document.getElementById('force-label')
      let score = 0
      if (pwd.length >= 6) score++
      if (pwd.length >= 10) score++
      if (/[A-Z]/.test(pwd) && /[a-z]/.test(pwd)) score++
      if (/[0-9]/.test(pwd) && /[^A-Za-z0-9]/.test(pwd)) score++

      const couleurs = ['#ef4444','#f97316','#eab308','#22c55e']
      const labels   = ['Trop faible','Faible','Bien','Fort 💪']
      bars.forEach((b, i) => {
        b.style.background = i < score ? couleurs[score - 1] : '#e2e8f0'
      })
      label.textContent = pwd.length ? labels[score - 1] || '' : ''
      label.style.color = score ? couleurs[score - 1] : '#94a3b8'
    }

    function afficherErreur(msg) {
      const el = document.getElementById('erreur-global')
      el.textContent = '⚠️ ' + msg
      el.style.display = 'block'
    }

    async function sInscrire() {
      document.getElementById('erreur-global').style.display = 'none'
      const nom      = document.getElementById('nom').value.trim()
      const email    = document.getElementById('email').value.trim()
      const tel      = document.getElementById('telephone').value.trim()
      const pwd      = document.getElementById('password').value
      const confirm  = document.getElementById('confirm-password').value
      const btn      = document.getElementById('btn-inscription')

      if (!nom || !email || !pwd || !confirm) return afficherErreur('Remplissez tous les champs obligatoires')
      if (pwd !== confirm) return afficherErreur('Les mots de passe ne correspondent pas')
      if (pwd.length < 6) return afficherErreur('Mot de passe trop court (min. 6 caractères)')

      btn.disabled = true
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Création...'

      const res  = await fetch('/client/inscription', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nom, email, telephone: tel, password: pwd })
      })
      const data = await res.json()

      if (data.token) {
        localStorage.setItem('clientToken', data.token)
        localStorage.setItem('clientNom', data.nom)
        localStorage.setItem('clientEmail', data.email)
        // Redirige vers dashboard ou la page demandée
        const redirect = new URLSearchParams(window.location.search).get('redirect')
        window.location.href = redirect || 'dashboard.html'
      } else {
        afficherErreur(data.erreur)
        btn.disabled = false
        btn.innerHTML = '<i class="fas fa-user-plus"></i> Créer mon compte'
      }
    }

    // Connexion avec Entrée
    document.addEventListener('keydown', e => { if (e.key === 'Enter') sInscrire() })
  </script>
</body>
</html>
