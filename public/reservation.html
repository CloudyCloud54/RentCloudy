<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Réservation — RentCloudy</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>

  <nav class="navbar">
    <div class="nav-logo">
  <i class="fas fa-cloud" style="color:#3b82f6;"></i>
  <span>Rent<strong>Cloudy</strong></span>
</div>
    <ul class="nav-links">
      <li><a href="index.html">Accueil</a></li>
      <li><a href="vehicules.html">Véhicules</a></li>
      <li><a href="hotels.html">Hôtels</a></li>
    </ul>
  </nav>

  <div class="page-header">
    <h1>Réserver</h1>
    <p>Remplissez le formulaire pour confirmer votre réservation</p>
  </div>

  <div class="reservation-form">
    <div id="item-resume" class="item-resume">
      <!-- Résumé du véhicule/hôtel choisi -->
    </div>

    <h2>Vos informations</h2>

    <div class="form-group">
      <label>Nom complet</label>
      <input type="text" id="nom" placeholder="Jean Dupont" />
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="jean@example.com" />
    </div>

    <div class="form-group">
      <label>Date de début</label>
      <input type="date" id="date-debut" />
    </div>

    <div class="form-group">
      <label>Date de fin</label>
      <input type="date" id="date-fin" />
    </div>

    <div class="prix-total" id="prix-total">
      <!-- Prix calculé automatiquement -->
    </div>

    <button class="btn btn-primary" style="width:100%; justify-content:center; margin-top:1rem;" onclick="confirmerReservation()">
      <i class="fas fa-check"></i> Confirmer la réservation
    </button>
  </div>

  <footer class="footer">
    <p>© 2026 RentCloudy — Fait avec ❤️ par le mari de Providence</p>
  </footer>

  <script src="js/reservation.js"></script>
</body>
</html>
